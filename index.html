<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Veil of Whispers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        :root {
            --gold: #e4c580;
            --blood: #8b2a2a;
            --void: #03000a;
            --parchment: #f2e9d0;
            --ember: #ff7e4a;
            /* New button colors */
            --standard-glow: #6a4e2e;
            --tithe-royal: #7a3e6e;
            --abyss-dark: #3c1e2f;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #2c1420 0%, var(--void) 100%);
            color: var(--gold);
            font-family: 'IM Fell English SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            perspective: 1200px;
            position: relative;
        }

        /* ===== NEW LIVELY BACKGROUND - HEARTS & FIREWORKS ===== */
        .living-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.4;
            animation: floatHeart linear infinite;
            filter: drop-shadow(0 0 3px rgba(228,197,128,0.3));
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            80% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) scale(1.2) rotate(15deg);
                opacity: 0;
            }
        }

        /* Firework sparks */
        .firework-spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffb347, #ff4d4d);
            border-radius: 50%;
            opacity: 0;
            animation: burstSpark 1.2s ease-out forwards;
            pointer-events: none;
            box-shadow: 0 0 6px gold;
        }

        @keyframes burstSpark {
            0% {
                opacity: 0;
                transform: scale(0.2) translateY(0);
            }
            20% {
                opacity: 0.9;
                transform: scale(1.5);
            }
            100% {
                opacity: 0;
                transform: scale(0.5) translateY(-40px);
            }
        }

        /* Glitter dust motes */
        .glitter-mote {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffd966;
            border-radius: 50%;
            opacity: 0;
            animation: driftGlitter 8s infinite linear;
            pointer-events: none;
            box-shadow: 0 0 4px #f3b33d;
        }

        @keyframes driftGlitter {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            30% {
                opacity: 0.8;
            }
            100% {
                transform: translate(40px, -60px) rotate(90deg);
                opacity: 0;
            }
        }

        /* Subtle animated swirl overlay */
        .veil {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(2px 2px at 20% 30%, var(--gold) 1px, transparent 1px),
                              radial-gradient(1px 1px at 70% 85%, #b96f30 1px, transparent 1px);
            background-size: 70px 70px, 40px 40px;
            opacity: 0.18;
            animation: driftRunes 35s linear infinite;
        }

        @keyframes driftRunes {
            0% { background-position: 0 0; }
            100% { background-position: 300px 500px; }
        }

        .candle-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .grimoire-header {
            text-align: center;
            z-index: 15;
            margin: 10px 0;
            position: relative;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.45rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #efd592 10%, #b48b3a 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(228, 197, 128, 0.4);
            margin: 0;
        }

        .sub {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #b48b5a;
            text-transform: uppercase;
            border-top: 1px solid rgba(228, 197, 128, 0.3);
            display: inline-block;
            padding-top: 4px;
        }

        /* Card styles - untouched descriptions */
        .card-holder {
            position: relative;
            width: 290px;
            height: 400px;
            z-index: 20;
            margin: 15px 0;
            filter: drop-shadow(0 15px 45px rgba(0,0,0,0.9));
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.95);
        }

        .card-front {
            background: #0f0712 url('https://www.transparenttextures.com/patterns/hexellence.png');
        }

        .card-back {
            background: linear-gradient(145deg, #1a0b1c 0%, #050308 100%);
            transform: rotateY(180deg);
            color: var(--parchment);
            font-family: 'MedievalSharp', serif;
            font-size: 1.15rem;
            line-height: 1.5;
            justify-content: center;
            border: 2px solid #634d2a;
        }

        .ritual-text {
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons - Distinct Colors */
        .ritual-altar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 350px;
            z-index: 25;
            margin-top: 10px;
        }

        button {
            background: rgba(15, 8, 20, 0.9);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 5px;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 0.75rem;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        button:active { transform: scale(0.96); }

        /* Standard Button - Warm Amber/Bronze */
        .btn-standard {
            background: radial-gradient(circle at 30% 20%, #8b5a2b, #4a3620);
            border-color: #e4b363;
            color: #ffefc0;
            text-shadow: 0 0 3px #3e2a1a;
            box-shadow: 0 0 6px rgba(228, 181, 99, 0.5);
        }
        .btn-standard:active { background: #b87c3a; color: #1e1308; }

        /* Queen's Tithe Button - Royal Purple & Crimson */
        .btn-tithe {
            background: radial-gradient(circle at 70% 30%, #6a2e6e, #35203b);
            border-color: #c27eb5;
            color: #f3d9ff;
            text-shadow: 0 0 2px #421c47;
            box-shadow: 0 0 6px rgba(194, 126, 181, 0.7);
        }
        .btn-tithe:active { background: #9b4d96; color: #24122b; }

        /* The Abyss button - already existing distinct, but we style separatly */
        .btn-abyss {
            background: radial-gradient(circle at 40% 50%, #2c1a2a, #150810);
            border-color: var(--blood);
            color: #ffb3b3;
            text-shadow: 0 0 4px #6b1a1a;
            box-shadow: 0 0 8px rgba(139, 42, 42, 0.6);
        }

        .btn-wide {
            grid-column: span 3;
            font-size: 0.85rem;
            letter-spacing: 2px;
            background: rgba(35, 15, 30, 0.8);
            border-color: #aa8866;
        }

        .banish-rune {
            margin-top: 20px;
            width: 180px;
            background: transparent;
            border: 1px dashed var(--gold);
            font-size: 0.65rem;
            opacity: 0.6;
            z-index: 30;
            color: #b48b5a;
        }

        /* Modal Overlay */
        .pact-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .pact-card {
            background: #120b17;
            border: 2px solid var(--gold);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 300px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .pact-card h2 {
            font-family: 'Cinzel Decorative';
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>

            document.getElementById('livingBg').appendChild(heartDiv);
            setTimeout(() => { if(heartDiv && heartDiv.remove) heartDiv.remove(); }, 12000);
        }

        // Firework burst at random positions (like celebrating sparks)
        function spawnFireworkBurst(xPercent, yPercent) {
            const burstCount = 12 + Math.floor(Math.random() * 12);
            for (let i = 0; i < burstCount; i++) {
                const spark = document.createElement('div');
                spark.classList.add('firework-spark');
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 70;
                const xOffset = Math.cos(angle) * distance * (Math.random() * 0.8 + 0.5);
                const yOffset = Math.sin(angle) * distance * (Math.random() * 0.8 + 0.5);
                spark.style.left = `calc(${xPercent}% + ${xOffset}px)`;
                spark.style.top = `calc(${yPercent}% + ${yOffset}px)`;
                spark.style.animation = `burstSpark ${0.9 + Math.random() * 0.6}s ease-out forwards`;
                spark.style.background = `radial-gradient(circle, ${['#ffb347','#ff6b6b','#f5cd7a','#ff8c94'][Math.floor(Math.random()*4)]}, #ff2d2d)`;
                document.getElementById('livingBg').appendChild(spark);
                setTimeout(() => { if(spark && spark.remove) spark.remove(); }, 1500);
            }
        }

        // Random firework initiation (floating across the background)
        function triggerRandomFirework() {
            const randX = 10 + Math.random() * 80;
            const randY = 20 + Math.random() * 70;
            spawnFireworkBurst(randX, randY);
        }

        // Glitter floating particles
        function createGlitterMote() {
            const mote = document.createElement('div');
            mote.classList.add('glitter-mote');
            mote.style.left = `${Math.random() * 100}%`;
            mote.style.top = `${Math.random() * 100}%`;
            mote.style.width = `${2 + Math.random() * 4}px`;
            mote.style.height = mote.style.width;
            mote.style.animationDuration = `${4 + Math.random() * 8}s`;
            mote.style.animationDelay = `${Math.random() * 6}s`;
            mote.style.background = `rgba(255, ${180 + Math.random() * 75}, ${80 + Math.random() * 80}, 0.7)`;
            document.getElementById('livingBg').appendChild(mote);
            setTimeout(() => { if(mote && mote.remove) mote.remove(); }, 11000);
        }

        // Periodic elements: hearts constantly, fireworks rarely, glitter gently
        let heartInterval = setInterval(() => { createHeart(); }, 800);
        let fireworkInterval = setInterval(() => { 
            if (Math.random() > 0.45) triggerRandomFirework(); 
        }, 5000);
        let glitterInterval = setInterval(() => { 
            for(let i=0;i<3;i++) createGlitterMote(); 
        }, 2500);

        function celebrateCardDraw() {

            }
        }
